<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель новостей</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .news-list {
            margin-top: 20px;
        }
        .news-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            background: #fff;
            position: relative;
        }
        .news-item h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .news-item img {
            max-width: 200px;
            max-height: 150px;
            display: block;
            margin-bottom: 10px;
        }
        .news-actions {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 5px;
        }
        .btn-edit {
            background-color: #3498db;
            color: white;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }
        .btn-add {
            background-color: #2ecc71;
            color: white;
            padding: 10px 15px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 100px;
        }
        .form-actions {
            text-align: right;
            margin-top: 20px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="admin-esc" href="./admin-tickets.html">Назад</a>
        <h1>Управление новостями</h1>

        <button class="btn btn-add" onclick="openModal('add')">Добавить новость</button>

        <div class="news-list" id="newsList">
            <!-- Новости будут загружены здесь -->
        </div>
    </div>

    <!-- Модальное окно для добавления/редактирования -->
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Добавить новость</h2>
            <form id="newsForm" enctype="multipart/form-data">
                <input type="hidden" id="newsId">

                <div class="form-group">
                    <label for="title">Заголовок:</label>
                    <input type="text" id="title" required>
                </div>

                <div class="form-group">
                    <label for="short_text">Краткое описание:</label>
                    <textarea id="short_text" required></textarea>
                </div>

                <div class="form-group">
                    <label for="full_text">Полный текст (необязательно):</label>
                    <textarea id="full_text"></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Изображение:</label>
                    <input type="file" id="image" accept="image/*">
                    <img id="imagePreview" class="preview-image" src="" style="display: none;">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-edit">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Токен для авторизации
        const token = localStorage.getItem('adminAuthToken');

        // Проверка авторизации
        if (!token) {
            window.location.href = '/admin-login.html';
        }

        // Загрузка новостей при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadNews);

        // Загрузка списка новостей
        async function loadNews() {
            try {
                const response = await fetch('https://scadaint.ru/api/admin/news', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Ошибка загрузки новостей');
                }

                const data = await response.json();
                renderNews(data.news);
            } catch (error) {
                console.error('Error:', error);
                alert('Не удалось загрузить новости');
            }
        }

        // Отображение новостей
        function renderNews(news) {
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = '';

            if (news.length === 0) {
                newsList.innerHTML = '<p>Новостей пока нет</p>';
                return;
            }

            news.forEach(item => {
                const newsItem = document.createElement('div');
                newsItem.className = 'news-item';

                let imageHtml = '';
                if (item.image_url) {
                    imageHtml = `<img src="${item.image_url}" alt="${item.title}">`;
                }

                newsItem.innerHTML = `
                    ${imageHtml}
                    <h3>${item.title}</h3>
                    <p>${item.short_text}</p>
                    <small>${new Date(item.created_at).toLocaleDateString()}</small>
                    <div class="news-actions">
                        <button class="btn btn-edit" onclick="editNews(${item.id})">Редактировать</button>
                        <button class="btn btn-delete" onclick="deleteNews(${item.id})">Удалить</button>
                    </div>
                `;

                newsList.appendChild(newsItem);
            });
        }

        // Открытие модального окна
        function openModal(action, newsId = null) {
            const modal = document.getElementById('newsModal');
            const modalTitle = document.getElementById('modalTitle');
            const form = document.getElementById('newsForm');

            if (action === 'add') {
                modalTitle.textContent = 'Добавить новость';
                form.reset();
                document.getElementById('imagePreview').style.display = 'none';
            } else if (action === 'edit') {
                modalTitle.textContent = 'Редактировать новость';
                loadNewsData(newsId);
            }

            modal.style.display = 'block';
        }

        // Закрытие модального окна
        function closeModal() {
            document.getElementById('newsModal').style.display = 'none';
        }

        // Загрузка данных новости для редактирования
        async function loadNewsData(newsId) {
            try {
                const response = await fetch(`https://scadaint.ru/api/news/${newsId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Ошибка загрузки новости');
                }

                const data = await response.json();
                const news = data.news;

                document.getElementById('newsId').value = news.id;
                document.getElementById('title').value = news.title;
                document.getElementById('short_text').value = news.short_text;
                document.getElementById('full_text').value = news.full_text || '';

                const imagePreview = document.getElementById('imagePreview');
                if (news.image_url) {
                    imagePreview.src = news.image_url;
                    imagePreview.style.display = 'block';
                } else {
                    imagePreview.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Не удалось загрузить данные новости');
            }
        }

        // Редактирование новости
        function editNews(newsId) {
            openModal('edit', newsId);
        }

        // Удаление новости
        async function deleteNews(newsId) {
            if (!confirm('Вы уверены, что хотите удалить эту новость?')) {
                return;
            }

            try {
                const response = await fetch(`https://scadaint.ru/api/admin/news/${newsId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Ошибка удаления новости');
                }

                alert('Новость успешно удалена');
                loadNews();
            } catch (error) {
                console.error('Error:', error);
                alert('Не удалось удалить новость');
            }
        }

        // Обработка отправки формы
        document.getElementById('newsForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newsId = document.getElementById('newsId').value;
            const title = document.getElementById('title').value;
            const short_text = document.getElementById('short_text').value;
            const full_text = document.getElementById('full_text').value;
            const imageFile = document.getElementById('image').files[0];

            const formData = new FormData();
            formData.append('title', title);
            formData.append('short_text', short_text);
            formData.append('full_text', full_text);
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                let response;
                if (newsId) {
                    // Редактирование существующей новости
                    response = await fetch(`https://scadaint.ru/api/admin/news/${newsId}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                } else {
                    // Добавление новой новости
                    response = await fetch('https://scadaint.ru/api/admin/news', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                }

                if (!response.ok) {
                    throw new Error('Ошибка сохранения новости');
                }

                closeModal();
                alert('Новость успешно сохранена');
                loadNews();
            } catch (error) {
                console.error('Error:', error);
                alert('Не удалось сохранить новость');
            }
        });

        // Превью изображения
        document.getElementById('image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
